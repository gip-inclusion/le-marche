{% load static dsfr_tags %}

<fieldset id="checkboxes-id_sectors" class="fr-fieldset" aria-labelledby="id_sectors-legend">
    <legend id="id_sectors-legend" class="fr-fieldset__legend fr-text--regular">
        <label>Activités :</label>
            *
    </legend>
    <div class="fr-fieldset__content">
        <div class="fr-checkbox-group">
            <div>
                {% for sector in form.fields.sectors.queryset %}
                    <div class="fr-checkbox-group">
                        <input id="id_sectors_0_{{ forloop.counter0 }}" type="checkbox" name="sectors" value="{{ sector.id }}" dsfr="dsfr" data-fr-js-checkbox-input="true">
                        <label class="fr-label" for="id_sectors_0_{{ forloop.counter0 }}">
                            {{ sector }}
                        </label>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</fieldset>
