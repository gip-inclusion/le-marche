{% load static dsfr_tags %}

<legend id="id_sectors-legend" class="fr-fieldset__legend fr-text--regular fr-mb-3v">
    <label>Veuillez sélectionner vos activités </label>
        *
</legend>

{% if form.errors %}
  <ul class="fr-messages-group fr-messages-group--error">
    {% for field, errors in form.errors.items %}
      {% for error in errors %}
        <li class="fr-message fr-message--error">
          <span class="fr-message__icon" aria-hidden="true"></span>
          <span class="fr-message__text">{{ error }}</span>
        </li>
      {% endfor %}
    {% endfor %}
  </ul>
{% endif %}

<div class="fr-fieldset__content">
    <div class="fr-checkbox-group">
        <div x-data="{ 
                selectedSectors: [{% if existing_sector_ids %}{% for sector_id in existing_sector_ids %}'{{ sector_id }}'{% if not forloop.last %},{% endif %}{% endfor %}{% endif %}], 
                triggerHtmxRequest(sectorId) {
                    if (this.selectedSectors.includes(sectorId)) {
                        const target = document.querySelector(`#prestaForm_${sectorId}`);
                        const url = `{% url 'dashboard_siaes:siae_activities_presta_geo_form' siae.slug %}?sectors=${sectorId}`;
                        htmx.ajax('GET', url, { target: target });
                    }
                },
                initExistingSectors() {
                    // Déclencher les requêtes pour les secteurs déjà sélectionnés
                    this.selectedSectors.forEach(sectorId => {
                        this.triggerHtmxRequest(sectorId);
                    });
                }
            }" 
            x-init="initExistingSectors()"
            class="fr-grid-row fr-grid-row--gutters fr-grid-row--middle">
            {% for sector in form.fields.sectors.queryset %}
                <div class="fr-card fr-card--no-background fr-col-12 fr-mb-2w fr-ml-lg-2w fr-px-2w fr-px-lg-4w fr-py-2v" style="border-radius: 8px;">
                        <div class="fr-checkbox-group fr-mt-0">
                            <input
                                type="checkbox"
                                name="sectors"
                                id="id_sectors_0_{{ forloop.counter0 }}"
                                value="{{ sector.id }}"
                                dsfr="dsfr"
                                data-fr-js-checkbox-input="true"
                                x-model="selectedSectors"
                                x-on:change="triggerHtmxRequest('{{ sector.id }}')"
                                {% if existing_sector_ids and sector.id|stringformat:"s" in existing_sector_ids %}checked{% endif %}
                            >
                            <label class="fr-label fr-mb-0" for="id_sectors_0_{{ forloop.counter0 }}">
                                <span class="fr-text--bold">{{ sector }}</span>
                            </label>
                        </div>
                        <div 
                            id="prestaForm_{{ sector.id }}"
                            x-data="{ selectedGeoRange: '', ready: false }"
                            x-init="ready = true"
                            x-show="selectedSectors.includes('{{ sector.id }}')"
                            class="fr-mt-1w fr-ml-lg-4w"
                        >
                            <!-- Presta and Geo form -->
                        </div>
                </div>
            {% endfor %}
        </div>
    </div>
</div>
