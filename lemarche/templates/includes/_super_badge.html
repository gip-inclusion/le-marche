{% if siae.is_eligible_clause_sociale or siae.super_badge %}
<span style="display: inline-flex; gap: 0.35rem; flex-wrap: wrap; align-items: center;">
    {% if siae.is_eligible_clause_sociale %}
        <span class="fr-badge fr-badge--success fr-badge--no-icon fr-badge--sm"
              title="Cette structure peut être mobilisée dans le cadre de la mise en œuvre de vos clauses sociales d'insertion.">
            Éligible à la clause sociale
        </span>
    {% endif %}
    {% if siae.super_badge %}
        <span class="fr-tag lemarche-super-badge">
            <span class="fr-icon-award-fill" aria-hidden="true"></span>
            Super prestataire
        </span>
    {% endif %}
</span>
{% endif %}
